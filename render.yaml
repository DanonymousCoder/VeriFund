services:
  - type: keyvalue
    name: verifund-redis
    plan: free
    ipAllowList: []

  - type: pserv
    name: verifund-member-service
    runtime: docker
    plan: starter
    dockerfilePath: ./member-service/Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: verifund-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_HOURS
        value: "24"

  - type: pserv
    name: verifund-cooperative-service
    runtime: docker
    plan: starter
    dockerfilePath: ./cooperative-service/Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: verifund-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: SQUAD_SECRET_KEY
        sync: false
      - key: SQUAD_PUBLIC_KEY
        sync: false
      - key: SQUAD_WEBHOOK_SECRET
        sync: false
      - key: SQUAD_BASE_URL
        value: "https://sandbox-api-d.squadco.com"
      - key: SQUAD_REQUEST_TIMEOUT
        value: "20"
      - key: SQUAD_SETTLEMENT_ACCOUNT
        sync: false
      - key: SQUAD_SETTLEMENT_MOBILE
        sync: false
      - key: SQUAD_SETTLEMENT_EMAIL
        sync: false
      - key: SQUAD_SETTLEMENT_ADDRESS
        sync: false
      - key: SQUAD_SETTLEMENT_DOB
        sync: false
      - key: SQUAD_SETTLEMENT_GENDER
        sync: false

  - type: pserv
    name: verifund-contribution-service
    runtime: docker
    plan: starter
    dockerfilePath: ./contribution-service/Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: verifund-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: verifund-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: SQUAD_SECRET_KEY
        sync: false
      - key: SQUAD_PUBLIC_KEY
        sync: false
      - key: SQUAD_WEBHOOK_SECRET
        sync: false
      - key: SQUAD_BASE_URL
        value: "https://sandbox-api-d.squadco.com"
      - key: SQUAD_REQUEST_TIMEOUT
        value: "20"
      - key: SQUAD_DIRECT_DEBIT_PATH
        value: "/transaction/mandate/create"
      - key: SQUAD_SETTLEMENT_ACCOUNT
        sync: false
      - key: SQUAD_SETTLEMENT_MOBILE
        sync: false
      - key: SQUAD_SETTLEMENT_EMAIL
        sync: false
      - key: SQUAD_SETTLEMENT_ADDRESS
        sync: false
      - key: SQUAD_SETTLEMENT_DOB
        sync: false
      - key: SQUAD_SETTLEMENT_GENDER
        sync: false
      - key: ALLOW_UNVERIFIED_WEBHOOKS
        value: "False"

  - type: pserv
    name: verifund-withdrawal-service
    runtime: docker
    plan: starter
    dockerfilePath: ./withdrawal-service/Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: verifund-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: SQUAD_SECRET_KEY
        sync: false
      - key: SQUAD_PUBLIC_KEY
        sync: false
      - key: SQUAD_WEBHOOK_SECRET
        sync: false
      - key: SQUAD_BASE_URL
        value: "https://sandbox-api-d.squadco.com"
      - key: SQUAD_REQUEST_TIMEOUT
        value: "20"
      - key: MIN_WITHDRAWAL_SIGNERS
        value: "3"

  - type: pserv
    name: verifund-ai-service
    runtime: docker
    plan: starter
    dockerfilePath: ./ai-service/Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: verifund-db
          property: connectionString

  - type: pserv
    name: verifund-notification-service
    runtime: docker
    plan: starter
    dockerfilePath: ./notification-service/Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: verifund-redis
          property: connectionString
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false

  - type: web
    name: verifund-api-gateway
    runtime: docker
    plan: starter
    dockerfilePath: ./api-gateway/Dockerfile
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: MEMBER_SERVICE_URL
        fromService:
          type: pserv
          name: verifund-member-service
          property: hostport
      - key: COOPERATIVE_SERVICE_URL
        fromService:
          type: pserv
          name: verifund-cooperative-service
          property: hostport
      - key: CONTRIBUTION_SERVICE_URL
        fromService:
          type: pserv
          name: verifund-contribution-service
          property: hostport
      - key: WITHDRAWAL_SERVICE_URL
        fromService:
          type: pserv
          name: verifund-withdrawal-service
          property: hostport
      - key: AI_SERVICE_URL
        fromService:
          type: pserv
          name: verifund-ai-service
          property: hostport
      - key: NOTIFICATION_SERVICE_URL
        fromService:
          type: pserv
          name: verifund-notification-service
          property: hostport

databases:
  - name: verifund-db
    plan: free
    databaseName: verifund
    user: verifund
